name: Deploy Shinn Gee Profile

on:
  push:
    branches:
      - main # Or your default branch name

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build 🏗️
        run: |
          cd shinn-gee-profile
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: shinn-gee-profile/dist
          branch: gh-pages
